<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <form method="POST">
            {%csrf_token%}
            {% for message in messages%}
            {{message}}
            {%endfor%}
            {%for field in form%}
            <label>{{field.label}}</label>
            {{field}}
            {%endfor%}
            <button type="submit">Login</button>
            <p>Don't have an account ?<a href={% url "Profile:Register" %}>Register Here</a></p>
        </form>
    </body>
    </html>
