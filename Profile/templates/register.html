<!DOCTYPE html>
<html>
<head>
    <title>{% if instance.pk %}Update{% else %}Create{% endif %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
        
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
            {% if instance.pk %}Update User{% else %}Create User{% endif %}
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.username.label }}
                </label>
                {{ u_f.username }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.first_name.label }}
                </label>
                {{ u_f.first_name }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.last_name.label }}
                </label>
                {{ u_f.last_name }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.email.label }}
                </label>
                {{ u_f.email }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ p_f.phone.label }}
                </label>
                {{ p_f.phone }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ p_f.gender.label }}
                </label>
                {{ p_f.gender }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.password1.label }}
                </label>
                {{ u_f.password1 }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ u_f.password2.label }}
                </label>
                {{ u_f.password2 }}
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200"
            >
                {% if instance.pk %}Update{% else %}Create{% endif %}
            </button>
        </form>

    </div>

</body>
</html>
